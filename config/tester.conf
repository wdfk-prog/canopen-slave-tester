# Stage-1 runtime configuration for TQ8MP.
[can]
interface=can1
bitrate=1000000

[master]
node_id=127
dcf_path=/opt/Ultra/Debug/canopen-slave-tester/config/master.dcf

[slave]
node_id=1
eds_path=/opt/Ultra/Debug/canopen-slave-tester/config/project.eds

[timeouts]
boot_ms=3000
sdo_ms=1000
nmt_state_ms=3000
pdo_ms=2500
lss_ms=3000

[console]
history_path=/opt/Ultra/Debug/canopen-slave-tester/state/history.txt
report_directory=/opt/Ultra/Debug/canopen-slave-tester/reports

[logging]
application_level=info
configuration_level=info
runtime_level=debug
socketcan_level=info
canopen_level=info
signal_level=info
lely_level=info
console_level=info
file_level=debug
flush_level=error
async_queue_size=4096
async_worker_count=1
overflow_policy=overrun_oldest
file_enabled=true
file_path=/opt/Ultra/Debug/canopen-slave-tester/logs/runtime.log
file_max_size=5242880
file_count=3
